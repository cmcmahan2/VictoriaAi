<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacific Web Builder — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #22a262; --dark: #0d1b2a; --dark2: #112235; --border: rgba(255,255,255,0.08); --muted: #6a8aaa; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
    .logo { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .logo span { color: var(--green); }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.4rem; }
    .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    label { display: block; text-align: left; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    input[type="password"] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: #fff; font-size: 1rem; font-family: inherit; margin-bottom: 1.25rem; outline: none; transition: border-color 0.2s; }
    input[type="password"]:focus { border-color: var(--green); }
    button { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 0.8rem; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; }
    button:hover { background: #28bb72; }
    button:disabled { background: #1a5c3a; cursor: not-allowed; }
    .error { background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.3); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.85rem; color: #f08080; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pacific <span>Web</span> Builder</div>
    <h1>Admin Dashboard</h1>
    <p class="sub"><span class="dot"></span>Private &middot; BC Business Pipeline</p>
    <div class="error" id="err">Incorrect password. Try again.</div>
    <form id="form" onsubmit="doLogin(event)">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="Enter your password" autofocus />
      <button type="submit" id="btn">Sign In</button>
    </form>
  </div>
  <script>
    if (localStorage.getItem('bcbui_token')) {
      fetch('/auth/check', { headers: { Authorization: 'Bearer ' + localStorage.getItem('bcbui_token') } })
        .then(r => { if (r.ok) window.location.href = '/dashboard'; });
    }
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      const pw  = document.getElementById('pw').value;
      btn.disabled = true; btn.textContent = 'Signing in...';
      err.style.display = 'none';
      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
        if (!res.ok) throw new Error('wrong');
        const { token } = await res.json();
        localStorage.setItem('bcbui_token', token);
        window.location.href = '/dashboard';
      } catch {
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
