<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS i-comesure Live Dashboard</title>
  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  SGS i-comesure Environmental Sensor Dashboard       ║
    ║  Config (lines below):                               ║
    ║    SENSOR_ID     — change to your sensor ID          ║
    ║    POLL_INTERVAL — ms between live updates           ║
    ║    TOKEN         — your API token                    ║
    ╚══════════════════════════════════════════════════════╝
  -->
  <style>
    :root {
      --bg:        #0d1117;
      --bg-card:   #161b22;
      --bg-card2:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --dim:       #6e7681;
      --blue:      #388bfd;
      --orange:    #e3702a;
      --green:     #3fb950;
      --grey:      #8b949e;
      --red:       #f85149;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex; align-items: center; gap: 1.5rem;
    }
    .topbar-title { font-size: 15px; font-weight: 700; color: var(--blue); white-space: nowrap; }
    .topbar-sensor { font-size: 12px; color: var(--muted); }
    .topbar-spacer { flex: 1; }
    .topbar-updated { font-size: 11px; color: var(--dim); white-space: nowrap; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-dot.error { background: var(--red); }
    .status-msg { font-size: 11px; color: var(--muted); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .status-dot.ok { animation: pulse 2s infinite; }

    /* ── Sensor selector ── */
    .controls {
      padding: 1rem 1.5rem 0;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .controls label { font-size: 12px; color: var(--muted); }
    #sensor-select {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 0.3rem 0.75rem; border-radius: 6px;
      font-size: 12px; min-width: 260px;
    }
    .btn {
      background: #1f6feb; color: #fff; border: none; border-radius: 6px;
      padding: 0.3rem 0.75rem; font-size: 12px; cursor: pointer;
    }
    .btn:hover { background: #388bfd; }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
      padding: 1rem 1.5rem 2rem;
    }

    /* ── Individual card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.4rem;
      position: relative; overflow: hidden;
      transition: border-color 0.3s;
    }
    .card.pulse-anim { animation: card-pulse 0.6s ease; }
    @keyframes card-pulse { 0%{border-color:var(--card-accent)}100%{border-color:var(--border)} }

    .card-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
    }
    .card-value {
      font-size: 26px; font-weight: 700; line-height: 1;
      color: var(--card-accent, var(--text));
    }
    .card-unit  { font-size: 11px; color: var(--dim); }
    .card-time  { font-size: 10px; color: var(--dim); margin-top: auto; }
    .card-spark { margin-top: 0.5rem; }

    /* Category colour bands */
    .card[data-cat="atmosphere"] { --card-accent: var(--blue);   border-top: 2px solid var(--blue);   }
    .card[data-cat="particulate"]{ --card-accent: var(--orange); border-top: 2px solid var(--orange); }
    .card[data-cat="gas"]        { --card-accent: var(--green);  border-top: 2px solid var(--green);  }
    .card[data-cat="other"]      { --card-accent: var(--grey);   border-top: 2px solid var(--grey);   }

    /* ── Sparkline SVG ── */
    .spark { display: block; width: 100%; height: 36px; }
    .spark-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Loading / error ── */
    .msg-panel {
      grid-column: 1/-1; text-align: center;
      padding: 3rem; color: var(--muted); font-size: 13px;
    }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cors-error {
      grid-column: 1/-1; background: rgba(248,81,73,0.1);
      border: 1px solid var(--red); border-radius: 8px;
      padding: 1.5rem; color: var(--red); font-size: 12px; line-height: 1.7;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">SGS i-comesure</div>
  <div class="topbar-sensor" id="topbar-sensor">Loading…</div>
  <div class="topbar-spacer"></div>
  <div class="topbar-updated" id="topbar-updated"></div>
  <div class="status-dot" id="status-dot"></div>
  <div class="status-msg" id="status-msg">Connecting…</div>
</div>

<!-- Controls -->
<div class="controls">
  <label>Sensor:</label>
  <select id="sensor-select" onchange="switchSensor(this.value)">
    <option value="">Loading…</option>
  </select>
  <button class="btn" onclick="poll()">&#8635; Refresh</button>
</div>

<!-- Card grid -->
<div class="grid" id="grid">
  <div class="msg-panel"><span class="spinner"></span> Loading sensor data…</div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIGURATION — edit these values
═══════════════════════════════════════════════════ */
const POLL_INTERVAL = 10000;   // milliseconds between live updates
let   SENSOR_ID     = 16718;   // default sensor ID
const API_BASE      = 'https://sgsusa-ws.i-comesure.com/api';
const TOKEN         = 'be5b70608d8bba345094b3cb375303c360c00641';
const CORS_PROXY    = 'https://corsproxy.io/?';
const HISTORY_MAX   = 100;     // max readings kept per parameter

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const history = {};   // { paramKey: [ {value, ts}, ... ] }
let   lastUpdate = null;
let   timerID    = null;
let   secsAgo    = 0;
let   sensorName = '';

/* ═══════════════════════════════════════════════════
   API HELPER (with CORS proxy + token)
═══════════════════════════════════════════════════ */
async function apiFetch(url) {
  const proxied = CORS_PROXY + encodeURIComponent(url);
  const res = await fetch(proxied, {
    headers: {
      'Authorization': `Token ${TOKEN}`,
      'Accept': 'application/json',
      'X-Requested-With': 'XMLHttpRequest'
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
  return res.json();
}

/* ═══════════════════════════════════════════════════
   CATEGORY INFERENCE
═══════════════════════════════════════════════════ */
function category(name) {
  const n = name.toLowerCase();
  if (/temp|rh|humid|pressure|dew|wind|rain|uv|lux|noise/.test(n)) return 'atmosphere';
  if (/pm|tsp|particle|dust|bin|count/.test(n))                     return 'particulate';
  if (/co2|co|voc|tvoc|o3|ozone|no2|so2|nh3|h2s|gas/.test(n))      return 'gas';
  return 'other';
}

/* ═══════════════════════════════════════════════════
   EXTRACT MEASUREMENTS from sensor detail response
═══════════════════════════════════════════════════ */
function extractReadings(data) {
  const readings = [];

  /* Case 1: measurements is an array of objects */
  const mArr = data.measurements;
  if (Array.isArray(mArr) && mArr.length) {
    for (const m of mArr) {
      // Sub-format A: { measurement_type: {name, unit}, value, date }
      if (m.measurement_type && m.value !== undefined) {
        readings.push({
          key:   slugify(m.measurement_type.name || m.measurement_type),
          label: m.measurement_type.name || String(m.measurement_type),
          unit:  m.measurement_type.unit || m.unit || '',
          value: parseFloat(m.value),
          ts:    m.date || m.timestamp || data.last_update
        });
        continue;
      }
      // Sub-format B: { name, value, unit, date }
      if (m.name !== undefined && m.value !== undefined) {
        readings.push({
          key:   slugify(m.name),
          label: m.name,
          unit:  m.unit || '',
          value: parseFloat(m.value),
          ts:    m.date || m.timestamp || data.last_update
        });
        continue;
      }
      // Sub-format C: flat numeric object with label from measurement_types
      for (const [k, v] of Object.entries(m)) {
        if (typeof v === 'number' && k !== 'id') {
          readings.push({ key: k, label: humanize(k), unit: '', value: v, ts: data.last_update });
        }
      }
    }
    if (readings.length) return readings;
  }

  /* Case 2: measurements is an object (key→value map) */
  if (mArr && typeof mArr === 'object' && !Array.isArray(mArr)) {
    for (const [k, v] of Object.entries(mArr)) {
      if (typeof v === 'number') {
        readings.push({ key: k, label: humanize(k), unit: unitFor(k), value: v, ts: data.last_update });
      }
    }
    if (readings.length) return readings;
  }

  /* Case 3: measurement_types gives field definitions, values are top-level */
  const types = data.measurement_types;
  if (Array.isArray(types) && types.length) {
    for (const t of types) {
      const key = t.keyword || t.name || t.id;
      if (key && data[key] !== undefined && typeof data[key] === 'number') {
        readings.push({ key: slugify(String(key)), label: t.name || String(key), unit: t.unit || '', value: data[key], ts: data.last_update });
      }
    }
    if (readings.length) return readings;
  }

  /* Case 4: fall back — collect all top-level numerics (excluding IDs) */
  const skip = new Set(['id','pk','calibration_ongoing','lat','lng','latitude','longitude']);
  for (const [k, v] of Object.entries(data)) {
    if (typeof v === 'number' && !skip.has(k)) {
      readings.push({ key: k, label: humanize(k), unit: unitFor(k), value: v, ts: data.last_update });
    }
  }
  return readings;
}

/* ═══════════════════════════════════════════════════
   STRING UTILITIES
═══════════════════════════════════════════════════ */
function slugify(s) { return String(s).toLowerCase().replace(/[^a-z0-9]/g,'_'); }
function humanize(k) {
  return k.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}
function unitFor(k) {
  const n = k.toLowerCase();
  if (/temp/.test(n))  return '°F';
  if (/rh|humid/.test(n)) return '%';
  if (/pm|tsp/.test(n)) return 'µg/m³';
  if (/co2/.test(n))   return 'ppm';
  if (/voc|tvoc/.test(n)) return 'ppb';
  if (/pressure/.test(n)) return 'hPa';
  if (/noise|sound/.test(n)) return 'dB';
  if (/lux|light/.test(n)) return 'lux';
  if (/bin|count|[0-9]um/.test(n)) return 'c/s';
  return '';
}

/* ═══════════════════════════════════════════════════
   SPARKLINE SVG
═══════════════════════════════════════════════════ */
function sparkline(vals, color) {
  if (vals.length < 2) return '';
  const W = 200, H = 36, pad = 2;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (W - pad * 2);
    const y = H - pad - ((v - min) / range) * (H - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline class="spark-line" points="${pts.join(' ')}" stroke="${color}" opacity="0.8"/>
    <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="${color}"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════════════ */
const CAT_COLORS = { atmosphere:'#388bfd', particulate:'#e3702a', gas:'#3fb950', other:'#8b949e' };

function renderCards(readings) {
  const grid = document.getElementById('grid');
  const ts   = lastUpdate ? lastUpdate.toLocaleTimeString() : '—';

  // First render: build all cards
  if (!document.querySelector('.card')) {
    grid.innerHTML = readings.map(r => {
      const cat   = category(r.label);
      const color = CAT_COLORS[cat];
      const vals  = (history[r.key] || []).map(h => h.value);
      return `
      <div class="card" data-cat="${cat}" data-key="${r.key}" style="--card-accent:${color}">
        <div class="card-label">${r.label}</div>
        <div class="card-value" id="val-${r.key}">${fmt(r.value)}</div>
        <div class="card-unit">${r.unit}</div>
        <div class="card-spark" id="spark-${r.key}">${sparkline(vals, color)}</div>
        <div class="card-time" id="ts-${r.key}">Updated ${ts}</div>
      </div>`;
    }).join('');
    return;
  }

  // Subsequent renders: update values + sparklines, pulse animation
  for (const r of readings) {
    const valEl   = document.getElementById(`val-${r.key}`);
    const sparkEl = document.getElementById(`spark-${r.key}`);
    const tsEl    = document.getElementById(`ts-${r.key}`);
    const card    = document.querySelector(`.card[data-key="${r.key}"]`);

    if (valEl)   valEl.textContent = fmt(r.value);
    if (tsEl)    tsEl.textContent  = `Updated ${ts}`;
    if (sparkEl) {
      const vals  = (history[r.key] || []).map(h => h.value);
      const color = CAT_COLORS[category(r.label)];
      sparkEl.innerHTML = sparkline(vals, color);
    }
    if (card) {
      card.classList.remove('pulse-anim');
      void card.offsetWidth;
      card.classList.add('pulse-anim');
    }
  }
}

function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  return Math.abs(v) >= 100 ? v.toFixed(1) : v.toFixed(3);
}

/* ═══════════════════════════════════════════════════
   UPDATE HISTORY
═══════════════════════════════════════════════════ */
function updateHistory(readings) {
  const ts = Date.now();
  for (const r of readings) {
    if (!history[r.key]) history[r.key] = [];
    history[r.key].push({ value: r.value, ts });
    if (history[r.key].length > HISTORY_MAX) history[r.key].shift();
  }
}

/* ═══════════════════════════════════════════════════
   FETCH + POLL
═══════════════════════════════════════════════════ */
async function poll() {
  const dot    = document.getElementById('status-dot');
  const msgEl  = document.getElementById('status-msg');

  try {
    const data = await apiFetch(`${API_BASE}/sensors/${SENSOR_ID}/`);
    console.log('Raw API response:', data);

    // Update sensor name in topbar
    sensorName = data.name || `Sensor ${SENSOR_ID}`;
    document.getElementById('topbar-sensor').textContent = sensorName;

    // If measurements is a URL string, follow it
    if (typeof data.measurements === 'string' && data.measurements.startsWith('http')) {
      try {
        const mData = await apiFetch(data.measurements);
        console.log('Measurements endpoint response:', mData);
        data.measurements = Array.isArray(mData) ? mData
          : (mData.results || mData.data || mData.measurements || mData);
      } catch(e) {
        console.warn('Could not fetch measurements URL:', e);
      }
    }

    // Same for measurement_types if it's a URL
    if (typeof data.measurement_types === 'string' && data.measurement_types.startsWith('http')) {
      try {
        const tData = await apiFetch(data.measurement_types);
        data.measurement_types = Array.isArray(tData) ? tData : (tData.results || tData);
      } catch(e) { /* non-fatal */ }
    }

    const readings = extractReadings(data);
    console.log('Extracted readings:', readings);

    if (!readings.length) {
      document.getElementById('grid').innerHTML = `
        <div class="cors-error">
          <b>Connected but no measurement data found.</b><br><br>
          Raw API keys: ${Object.keys(data).join(', ')}<br><br>
          measurements value: ${JSON.stringify(data.measurements)?.substring(0, 500)}
        </div>`;
      return;
    }

    updateHistory(readings);
    renderCards(readings);

    lastUpdate = new Date();
    secsAgo = 0;
    dot.className = 'status-dot ok';
    msgEl.textContent = 'Live';

  } catch (err) {
    console.error(err);
    dot.className = 'status-dot error';
    const isCors = err.message?.toLowerCase().includes('fetch') || err.message?.toLowerCase().includes('cors');
    msgEl.textContent = isCors ? 'CORS blocked — check API settings' : err.message;
    if (!document.querySelector('.card')) {
      document.getElementById('grid').innerHTML = `
        <div class="cors-error">
          <b>Could not load sensor data.</b><br><br>
          Error: ${err.message}<br><br>
          ${isCors ? 'The API is blocking cross-origin browser requests. The CORS proxy may be rate-limited. Try refreshing.' : ''}
        </div>`;
    }
  }
}

/* ═══════════════════════════════════════════════════
   SENSOR LIST
═══════════════════════════════════════════════════ */
async function loadSensorList() {
  try {
    const data = await apiFetch(`${API_BASE}/sensors/`);
    const sensors = Array.isArray(data) ? data : (data.results || []);
    const select  = document.getElementById('sensor-select');
    select.innerHTML = '';
    for (const s of sensors) {
      const id  = s.id || s.pk;
      const nm  = s.name || s.serial_number || `Sensor ${id}`;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = `${nm}`;
      if (String(id) === String(SENSOR_ID)) opt.selected = true;
      select.appendChild(opt);
    }
  } catch(e) {
    document.getElementById('sensor-select').innerHTML =
      `<option value="${SENSOR_ID}">Sensor ${SENSOR_ID}</option>`;
  }
}

function switchSensor(id) {
  if (!id) return;
  SENSOR_ID = id;
  Object.keys(history).forEach(k => delete history[k]);
  document.getElementById('grid').innerHTML =
    '<div class="msg-panel"><span class="spinner"></span> Loading…</div>';
  poll();
}

/* ═══════════════════════════════════════════════════
   "X seconds ago" counter
═══════════════════════════════════════════════════ */
setInterval(() => {
  secsAgo++;
  const el = document.getElementById('topbar-updated');
  if (lastUpdate) el.textContent = `Updated ${secsAgo}s ago`;
}, 1000);

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
(async function init() {
  await loadSensorList();
  await poll();
  timerID = setInterval(poll, POLL_INTERVAL);
})();
</script>
</body>
</html>
