<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS i-comesure Live Dashboard</title>
  <!--
    SGS i-comesure Environmental Sensor Dashboard
    Config below: SENSOR_ID, POLL_INTERVAL, TOKEN
  -->
  <style>
    :root {
      --bg:        #0d1117;
      --bg-card:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --dim:       #6e7681;
      --blue:      #388bfd;
      --orange:    #e3702a;
      --green:     #3fb950;
      --grey:      #8b949e;
      --red:       #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 13px; min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 52px;
      display: flex; align-items: center; gap: 1rem;
    }
    .topbar-title  { font-size: 15px; font-weight: 700; color: var(--blue); white-space: nowrap; }
    .topbar-sensor { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-spacer { flex: 1; }
    .topbar-updated{ font-size: 11px; color: var(--dim); white-space: nowrap; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .status-dot.error { background: var(--red); animation: none; }
    .status-dot.ok    { animation: pulse 2s infinite; }
    .status-msg { font-size: 11px; color: var(--muted); white-space: nowrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* Controls */
    .controls {
      padding: 1rem 1.5rem 0;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .controls label { font-size: 12px; color: var(--muted); }
    #sensor-select {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 0.35rem 0.75rem; border-radius: 6px;
      font-size: 12px; min-width: 260px;
    }
    .btn {
      background: #1f6feb; color: #fff; border: none; border-radius: 6px;
      padding: 0.4rem 0.85rem; font-size: 12px; cursor: pointer;
    }
    .btn:hover { background: #388bfd; }
    .legend { display: flex; gap: 1rem; margin-left: auto; flex-wrap: wrap; }
    .legend span { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
    .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem; padding: 1rem 1.5rem 2rem;
    }

    /* Card */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.9rem 1rem;
      display: flex; flex-direction: column; gap: 0.35rem;
      position: relative; overflow: hidden;
      border-top: 2px solid var(--card-accent, var(--grey));
    }
    .card.flash { animation: flash 0.7s ease; }
    @keyframes flash {
      0%   { background: color-mix(in srgb, var(--card-accent) 18%, var(--bg-card)); }
      100% { background: var(--bg-card); }
    }
    .card-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-value {
      font-size: 26px; font-weight: 700; line-height: 1.1;
      color: var(--card-accent, var(--text));
    }
    .card-unit  { font-size: 11px; color: var(--dim); }
    .card-spark { margin-top: 0.4rem; height: 36px; }
    .card-time  { font-size: 10px; color: var(--dim); margin-top: auto; padding-top: 0.4rem; }

    .spark { display: block; width: 100%; height: 36px; }
    .spark-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Messages */
    .msg-panel {
      grid-column: 1/-1; text-align: center; padding: 3rem;
      color: var(--muted); font-size: 13px;
    }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-panel {
      grid-column: 1/-1; background: rgba(248,81,73,0.08);
      border: 1px solid var(--red); border-radius: 8px;
      padding: 1.5rem; color: var(--red); font-size: 12px; line-height: 1.7;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">SGS i-comesure</div>
  <div class="topbar-sensor" id="topbar-sensor">Loading…</div>
  <div class="topbar-spacer"></div>
  <div class="topbar-updated" id="topbar-updated"></div>
  <div class="status-dot" id="status-dot"></div>
  <div class="status-msg" id="status-msg">Connecting…</div>
</div>

<div class="controls">
  <label>Sensor:</label>
  <select id="sensor-select" onchange="switchSensor(this.value)">
    <option value="">Loading…</option>
  </select>
  <button class="btn" onclick="poll()">&#8635; Refresh</button>
  <div class="legend">
    <span><i style="background:var(--blue)"></i>Atmosphere</span>
    <span><i style="background:var(--orange)"></i>Particulates</span>
    <span><i style="background:var(--green)"></i>Gases</span>
    <span><i style="background:var(--grey)"></i>Other</span>
  </div>
</div>

<div class="grid" id="grid">
  <div class="msg-panel"><span class="spinner"></span> Loading sensor data…</div>
</div>

<script>
/* ═══════════ CONFIGURATION ═══════════ */
const POLL_INTERVAL = 10000;   // ms between live updates
let   SENSOR_ID     = 16718;   // default sensor
const API_BASE      = 'https://sgsusa-ws.i-comesure.com/api';
const TOKEN         = 'be5b70608d8bba345094b3cb375303c360c00641';
const CORS_PROXY    = 'https://corsproxy.io/?';
const HISTORY_LIMIT = 60;      // readings fetched for sparkline trend

/* ═══════════ STATE ═══════════ */
let lastUpdate = null;   // Date of last successful poll
let secsAgo    = 0;
let prevValues = {};     // key -> last value (to flash on change)
let cardKeys   = '';     // signature of current card set

/* ═══════════ API HELPER (CORS proxy + token) ═══════════ */
async function apiFetch(url) {
  const proxied = CORS_PROXY + encodeURIComponent(url);
  const res = await fetch(proxied, {
    headers: {
      'Authorization': `Token ${TOKEN}`,
      'Accept': 'application/json',
      'X-Requested-With': 'XMLHttpRequest'
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
  return res.json();
}

/* ═══════════ CATEGORY + UNIT INFERENCE ═══════════ */
const CAT_COLORS = { atmosphere:'#388bfd', particulate:'#e3702a', gas:'#3fb950', other:'#8b949e' };

function category(name) {
  const n = name.toLowerCase().trim();
  if (/sampling|flow rate|period|tor_|calibrat/.test(n))            return 'other';
  if (/temp|^rh|humid|pressure|dew|baro/.test(n))                   return 'atmosphere';
  if (/pm\s|pm\d|tsp|particle|dust|µm|um\b|\dum|bin|count/.test(n)) return 'particulate';
  if (/co2|voc|tvoc|ozone|o3|no2|so2|nh3|h2s|\bco\b|gas/.test(n))   return 'gas';
  return 'other';
}

function unitFor(type) {
  const n = type.toLowerCase();
  if (/temp/.test(n))            return '°F';
  if (/^rh|humid/.test(n))       return '%';
  if (/sampling period/.test(n)) return 's';
  if (/flow rate/.test(n))       return 'L/min';
  if (/tor_/.test(n))            return '';
  if (/µm|um\b|\dum/.test(n))    return '#/cm³';
  if (/pm|tsp/.test(n))          return 'µg/m³';
  return '';
}

/* ═══════════ UTILITIES ═══════════ */
function slugify(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  if (Number.isInteger(v)) return String(v);
  return Math.abs(v) >= 100 ? v.toFixed(1) : v.toFixed(3);
}

/* ═══════════ EXTRACT READINGS + SERIES ═══════════
   Input: the /measurements response { count, next, results: [...] }
   Each result: { date, calibration_ongoing, measurements: [ {type, value}, ... ] }
   results are newest-first.
═══════════ */
function extractReadings(measResponse) {
  const results = (measResponse && measResponse.results) || [];
  if (!results.length || !Array.isArray(results[0].measurements)) {
    return { readings: [], series: {}, latestDate: null };
  }
  const latest = results[0];

  // Current values from the newest reading
  const readings = latest.measurements.map(m => ({
    key:   slugify(m.type),
    label: m.type,
    value: parseFloat(m.value),
    unit:  unitFor(m.type)
  }));

  // Time-series per parameter (oldest → newest) for sparklines
  const series = {};
  for (let i = results.length - 1; i >= 0; i--) {
    const r = results[i];
    if (!Array.isArray(r.measurements)) continue;
    for (const m of r.measurements) {
      const key = slugify(m.type);
      (series[key] = series[key] || []).push(parseFloat(m.value));
    }
  }
  return { readings, series, latestDate: latest.date };
}

/* ═══════════ SPARKLINE SVG ═══════════ */
function sparkline(vals, color) {
  vals = (vals || []).filter(v => !isNaN(v));
  if (vals.length < 2) return '';
  const W = 200, H = 36, pad = 3;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (W - pad * 2);
    const y = H - pad - ((v - min) / range) * (H - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const last = pts[pts.length - 1].split(',');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline class="spark-line" points="${pts.join(' ')}" stroke="${color}" opacity="0.85"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${color}"/>
  </svg>`;
}

/* ═══════════ RENDER ═══════════ */
function renderCards(readings, series, latestDate) {
  const grid = document.getElementById('grid');
  const tstr = latestDate ? new Date(latestDate).toLocaleTimeString() : '—';
  const sig  = readings.map(r => r.key).join('|');

  // Rebuild all cards if the parameter set changed
  if (sig !== cardKeys) {
    cardKeys = sig;
    grid.innerHTML = readings.map(r => {
      const cat   = category(r.label);
      const color = CAT_COLORS[cat];
      const spark = sparkline(series[r.key], color);
      return `
      <div class="card" data-cat="${cat}" data-key="${r.key}" style="--card-accent:${color}">
        <div class="card-label" title="${r.label}">${r.label}</div>
        <div class="card-value" id="val-${r.key}">${fmt(r.value)}</div>
        <div class="card-unit">${r.unit || '&nbsp;'}</div>
        <div class="card-spark" id="spark-${r.key}">${spark}</div>
        <div class="card-time" id="ts-${r.key}">Reading ${tstr}</div>
      </div>`;
    }).join('');
    readings.forEach(r => prevValues[r.key] = r.value);
    return;
  }

  // Update in place
  for (const r of readings) {
    const valEl   = document.getElementById(`val-${r.key}`);
    const sparkEl = document.getElementById(`spark-${r.key}`);
    const tsEl    = document.getElementById(`ts-${r.key}`);
    const card    = document.querySelector(`.card[data-key="${r.key}"]`);
    if (valEl) valEl.textContent = fmt(r.value);
    if (tsEl)  tsEl.textContent  = `Reading ${tstr}`;
    if (sparkEl) sparkEl.innerHTML = sparkline(series[r.key], CAT_COLORS[category(r.label)]);
    if (card && prevValues[r.key] !== r.value) {
      card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
    }
    prevValues[r.key] = r.value;
  }
}

/* ═══════════ POLL ═══════════ */
async function poll() {
  const dot   = document.getElementById('status-dot');
  const msgEl = document.getElementById('status-msg');
  try {
    const sensor = await apiFetch(`${API_BASE}/sensors/${SENSOR_ID}/`);
    document.getElementById('topbar-sensor').textContent =
      `${sensor.name || 'Sensor ' + SENSOR_ID} · ${sensor.serial_number || ''}`.trim();

    // Follow the measurements URL, requesting recent history for sparklines
    let measUrl = sensor.measurements;
    if (typeof measUrl !== 'string' || !measUrl.startsWith('http')) {
      throw new Error('Sensor has no measurements endpoint');
    }
    if (!measUrl.endsWith('/')) measUrl += '/';
    measUrl += `?limit=${HISTORY_LIMIT}`;

    const measResponse = await apiFetch(measUrl);
    const { readings, series, latestDate } = extractReadings(measResponse);

    if (!readings.length) {
      throw new Error('Connected, but the latest reading contained no measurements.');
    }

    renderCards(readings, series, latestDate);
    lastUpdate = new Date(); secsAgo = 0;
    dot.className = 'status-dot ok';
    msgEl.textContent = 'Live';
  } catch (err) {
    console.error(err);
    dot.className = 'status-dot error';
    const networky = /failed to fetch|networkerror|load failed/i.test(err.message);
    msgEl.textContent = networky ? 'Connection / CORS error' : err.message;
    if (!document.querySelector('.card')) {
      document.getElementById('grid').innerHTML = `
        <div class="error-panel">
          <b>Could not load sensor data.</b><br><br>
          ${err.message}<br><br>
          ${networky ? 'The browser may be blocking the cross-origin request, or the CORS proxy is rate-limited. Click Refresh to retry.' : ''}
        </div>`;
    }
  }
}

/* ═══════════ SENSOR LIST ═══════════ */
async function loadSensorList() {
  const select = document.getElementById('sensor-select');
  try {
    const data = await apiFetch(`${API_BASE}/sensors/?limit=200`);
    const sensors = Array.isArray(data) ? data : (data.results || []);
    select.innerHTML = '';
    let found = false;
    for (const s of sensors) {
      const id = s.id || s.pk;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = s.name || s.serial_number || `Sensor ${id}`;
      if (String(id) === String(SENSOR_ID)) { opt.selected = true; found = true; }
      select.appendChild(opt);
    }
    if (!found) {
      const opt = document.createElement('option');
      opt.value = SENSOR_ID; opt.textContent = `Sensor ${SENSOR_ID}`;
      opt.selected = true; select.prepend(opt);
    }
  } catch (e) {
    select.innerHTML = `<option value="${SENSOR_ID}" selected>Sensor ${SENSOR_ID}</option>`;
  }
}

function switchSensor(id) {
  if (!id) return;
  SENSOR_ID  = id;
  cardKeys   = '';
  prevValues = {};
  document.getElementById('grid').innerHTML =
    '<div class="msg-panel"><span class="spinner"></span> Loading…</div>';
  poll();
}

/* ═══════════ "X seconds ago" COUNTER ═══════════ */
setInterval(() => {
  if (!lastUpdate) return;
  secsAgo++;
  document.getElementById('topbar-updated').textContent = `Polled ${secsAgo}s ago`;
}, 1000);

/* ═══════════ INIT ═══════════ */
(async function init() {
  await loadSensorList();
  await poll();
  setInterval(poll, POLL_INTERVAL);
})();
</script>
</body>
</html>
