<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS i-comesure Sensor Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #333;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-size: 22px;
      font-weight: 900;
      color: #1a5276;
      letter-spacing: 1px;
    }
    .header-right {
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .index-mode {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #2980b9;
      font-size: 12px;
    }

    /* ── Sensor title bar ── */
    .sensor-bar {
      background: #fff;
      padding: 14px 20px 0;
      border-bottom: 1px solid #ddd;
    }
    .sensor-title {
      font-size: 17px;
      font-weight: bold;
      color: #1a5276;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ai-badge {
      background: #2ecc71;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 3px;
    }
    .nav-tabs {
      display: flex;
      gap: 0;
      border-bottom: none;
    }
    .nav-tab {
      padding: 8px 18px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      margin-right: 2px;
      border-radius: 4px 4px 0 0;
      background: #f8f8f8;
      text-decoration: none;
    }
    .nav-tab.active {
      background: #fff;
      border-color: #ddd;
      color: #1a5276;
      font-weight: bold;
      border-bottom-color: #fff;
      margin-bottom: -1px;
    }
    .nav-tab:hover { background: #e8f4fc; }

    /* ── Page body ── */
    .page {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Section card ── */
    .section-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .section-header {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      color: #1a5276;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-body { padding: 16px; }

    /* ── Sensor selector ── */
    .selector-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .selector-row label { font-size: 13px; font-weight: bold; color: #555; }
    #sensor-select {
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      min-width: 280px;
      background: #fff;
    }
    .refresh-btn {
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #1a6595; }
    .last-update { font-size: 11px; color: #888; }

    /* ── Tile grid ── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    @media (max-width: 1100px) { .tile-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 700px)  { .tile-grid { grid-template-columns: repeat(2, 1fr); } }

    .tile {
      background: #4a7fa5;
      color: #fff;
      border-radius: 4px;
      padding: 14px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      transition: background 0.2s;
    }
    .tile:hover { background: #3d6d8f; }
    .tile-label {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
      opacity: 0.9;
      line-height: 1.3;
    }
    .tile-value {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }
    .tile-unit {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Colour coding by reading level */
    .tile-good     { background: #4a7fa5; }
    .tile-moderate { background: #e67e22; }
    .tile-high     { background: #c0392b; }
    .tile-na       { background: #7f8c8d; }

    /* ── Status indicator ── */
    .status-ok   { background: #27ae60; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
    .status-warn { background: #e67e22; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
    .status-err  { background: #c0392b; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }

    /* ── Sensor info table ── */
    .info-table { width: 100%; border-collapse: collapse; }
    .info-table td { padding: 6px 10px; font-size: 13px; }
    .info-table td:first-child { font-weight: bold; color: #555; width: 180px; }
    .info-table tr:nth-child(even) td { background: #f9f9f9; }

    /* ── Loading / error ── */
    .loading-msg {
      text-align: center;
      padding: 30px;
      color: #888;
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #ddd;
      border-top-color: #2980b9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #c0392b; text-align: center; padding: 20px; font-size: 13px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">SGS</div>
  <div class="header-right">
    <span>OEM_SGS_USA ▾</span>
    <span class="index-mode">◆ Index mode: OFF</span>
  </div>
</div>

<!-- Sensor title + nav -->
<div class="sensor-bar">
  <div class="sensor-title">
    <span id="page-title">Loading sensor…</span>
    <span class="ai-badge">AI-Ready</span>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab active" href="#">Home</a>
    <a class="nav-tab" href="#">Time series</a>
    <a class="nav-tab" href="#">Download</a>
    <a class="nav-tab" href="#">Warnings</a>
    <a class="nav-tab" href="#">Reports</a>
    <a class="nav-tab" href="#">EcomCal</a>
    <a class="nav-tab" href="#">EcomTune</a>
    <a class="nav-tab" href="#">EcomShow</a>
    <a class="nav-tab" href="#">EcomDisplay</a>
  </div>
</div>

<!-- Page body -->
<div class="page">

  <!-- Sensor selector -->
  <div class="section-card">
    <div class="section-header">Sensor Selection</div>
    <div class="section-body">
      <div class="selector-row">
        <label>Sensor:</label>
        <select id="sensor-select" onchange="loadSensor(this.value)">
          <option value="">Loading sensors…</option>
        </select>
        <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
        <span class="last-update" id="last-update"></span>
      </div>
    </div>
  </div>

  <!-- Dashboard tiles -->
  <div class="section-card">
    <div class="section-header">
      Dashboard
      <span id="status-badge"></span>
    </div>
    <div class="section-body">
      <div class="tile-grid" id="tile-grid">
        <div class="loading-msg" style="grid-column:1/-1"><span class="spinner"></span> Loading sensor data…</div>
      </div>
    </div>
  </div>

  <!-- Sensor info -->
  <div class="section-card">
    <div class="section-header">Sensor information</div>
    <div class="section-body">
      <table class="info-table" id="info-table">
        <tr><td colspan="2" class="loading-msg"><span class="spinner"></span> Loading…</td></tr>
      </table>
    </div>
  </div>

</div>

<footer>SGS i-comesure · Auto-refreshes every 5 minutes</footer>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const API_BASE = 'https://sgsusa-ws.i-comesure.com/api';
const TOKEN    = 'be5b70608d8bba345094b3cb375303c360c00641';
const HEADERS  = { 'Authorization': `Token ${TOKEN}`, 'Accept': 'application/json' };

const CORS_PROXY = 'https://corsproxy.io/?';

let currentSensorId = 16718;

/* ═══════════════════════════════════════════════
   API HELPER
═══════════════════════════════════════════════ */
async function api(path) {
  const target  = `${API_BASE}${path}`;
  const proxied = `${CORS_PROXY}${encodeURIComponent(target)}`;
  const res = await fetch(proxied, {
    headers: { ...HEADERS, 'X-Requested-With': 'XMLHttpRequest' }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} - ${res.statusText}`);
  return res.json();
}

/* ═══════════════════════════════════════════════
   FIELD DEFINITIONS
   Maps known API field names → display label + unit
═══════════════════════════════════════════════ */
const FIELD_MAP = [
  // Temperature & humidity
  { keys: ['temperature','temp','Temperature'],            label: 'Temperature',  unit: 'deg F' },
  { keys: ['rh','humidity','relative_humidity','RH'],      label: 'RH',           unit: '%'     },
  // PM
  { keys: ['pm1','pm_1','PM1','pm1_0'],                   label: 'PM 1',         unit: 'ug/m3' },
  { keys: ['pm2_5','pm2p5','PM2_5','pm25','pm2.5'],        label: 'PM 2.5',       unit: 'ug/m3' },
  { keys: ['pm4','pm_4','PM4','pm4_0'],                   label: 'PM 4',         unit: 'ug/m3' },
  { keys: ['pm10','pm_10','PM10'],                        label: 'PM 10',        unit: 'ug/m3' },
  // TSP
  { keys: ['tsp','tsp7','TSP7','tsp_7'],                  label: 'TSP 7',        unit: 'ug/m3' },
  { keys: ['tsp20','TSP20','tsp_20'],                     label: 'TSP 20',       unit: 'ug/m3' },
  { keys: ['tsp40','TSP40','tsp_40'],                     label: 'TSP 40',       unit: 'ug/m3' },
  // Particle counts
  { keys: ['bin0','n035_046','count_035_046','0.35-0.46'], label: '0.35-0.46um', unit: 'c/s'   },
  { keys: ['bin1','n046_066','count_046_066','0.46-0.66'], label: '0.46-0.66um', unit: 'c/s'   },
  { keys: ['bin2','n066_100','count_066_100','0.66-1.0'],  label: '0.66-1.0um',  unit: 'c/s'   },
  { keys: ['bin3','n100_130','count_100_130','1.0-1.3'],   label: '1.0-1.3um',   unit: 'c/s'   },
  { keys: ['bin4','n130_170','count_130_170','1.3-1.7'],   label: '1.3-1.7um',   unit: 'c/s'   },
  { keys: ['bin5','n170_230','count_170_230','1.7-2.3'],   label: '1.7-2.3um',   unit: 'c/s'   },
  { keys: ['bin6','n230_300','count_230_300','2.3-3.0'],   label: '2.3-3.0um',   unit: 'c/s'   },
  // CO2 / VOC / other common
  { keys: ['co2','CO2'],                                  label: 'CO₂',          unit: 'ppm'   },
  { keys: ['voc','VOC','tvoc'],                           label: 'VOC',          unit: 'ppb'   },
  { keys: ['o3','O3','ozone'],                            label: 'O₃',           unit: 'ppb'   },
  { keys: ['no2','NO2'],                                  label: 'NO₂',          unit: 'ppb'   },
  { keys: ['so2','SO2'],                                  label: 'SO₂',          unit: 'ppb'   },
  { keys: ['co','CO'],                                    label: 'CO',           unit: 'ppm'   },
  { keys: ['pressure','baro','barometric_pressure'],       label: 'Pressure',     unit: 'hPa'   },
  { keys: ['noise','sound_level'],                        label: 'Noise',        unit: 'dB'    },
  { keys: ['lux','light'],                                label: 'Light',        unit: 'lux'   },
];

/* Resolve a data object against FIELD_MAP — returns matched tiles */
function resolveTiles(data) {
  const found = [];
  const usedKeys = new Set();

  for (const def of FIELD_MAP) {
    for (const k of def.keys) {
      if (k in data && !usedKeys.has(k)) {
        usedKeys.add(k);
        found.push({ label: def.label, value: data[k], unit: def.unit });
        break;
      }
    }
  }

  // Catch-all: any remaining numeric fields not already mapped
  for (const [k, v] of Object.entries(data)) {
    if (!usedKeys.has(k) && typeof v === 'number' && !k.toLowerCase().includes('id')) {
      found.push({ label: k, value: v, unit: '' });
    }
  }

  return found;
}

/* ═══════════════════════════════════════════════
   LOAD SENSORS LIST
═══════════════════════════════════════════════ */
async function loadSensorList() {
  try {
    const data = await api('/sensors/');
    const sensors = Array.isArray(data) ? data : (data.results || [data]);
    const select = document.getElementById('sensor-select');
    select.innerHTML = '';
    for (const s of sensors) {
      const id   = s.id || s.pk || s.sensor_id;
      const name = s.name || s.serial_number || s.label || `Sensor ${id}`;
      const opt  = document.createElement('option');
      opt.value = id;
      opt.textContent = `${name} (${id})`;
      if (String(id) === String(currentSensorId)) opt.selected = true;
      select.appendChild(opt);
    }
    if (!select.value && sensors.length) {
      currentSensorId = sensors[0].id || sensors[0].pk;
    }
  } catch (e) {
    document.getElementById('sensor-select').innerHTML =
      `<option value="${currentSensorId}">Sensor ${currentSensorId}</option>`;
  }
}

/* ═══════════════════════════════════════════════
   LOAD SENSOR DATA
═══════════════════════════════════════════════ */
async function loadSensor(id) {
  if (id) currentSensorId = id;
  const grid  = document.getElementById('tile-grid');
  const info  = document.getElementById('info-table');
  const title = document.getElementById('page-title');

  grid.innerHTML = `<div class="loading-msg" style="grid-column:1/-1"><span class="spinner"></span> Loading…</div>`;

  try {
    // Try common endpoint patterns in order
    const endpoints = [
      `/sensors/${currentSensorId}/`,
      `/sensors/${currentSensorId}/data/`,
      `/sensors/${currentSensorId}/measures/`,
      `/sensors/${currentSensorId}/latest/`,
    ];

    let sensorData = null;
    let sensorMeta = null;

    for (const ep of endpoints) {
      try {
        const d = await api(ep);
        if (ep === endpoints[0]) {
          sensorMeta = d;
          // Check if readings are embedded
          const readings = d.last_reading || d.latest || d.data || d.measures || d.readings;
          if (readings && typeof readings === 'object') sensorData = readings;
          else if (typeof d === 'object') sensorData = d;
        } else {
          sensorData = Array.isArray(d) ? d[0] : d;
          break;
        }
      } catch(e) { /* try next */ }
    }

    if (!sensorData) throw new Error('No sensor data found');

    // ── Title ──
    const name = sensorMeta?.name || sensorMeta?.serial_number || `Sensor ${currentSensorId}`;
    const model = sensorMeta?.model || sensorMeta?.device_type || 'ECOMZEN';
    title.textContent = `${model} - ${name}`;

    // ── Status badge ──
    const status = sensorMeta?.status || sensorMeta?.state || 'OK';
    const badge  = document.getElementById('status-badge');
    const cls    = status.toString().toLowerCase() === 'ok' ? 'status-ok' :
                   status.toString().toLowerCase().includes('warn') ? 'status-warn' : 'status-err';
    badge.innerHTML = `<span class="${cls}">${status}</span>`;

    // ── Tiles ──
    const tiles = resolveTiles(sensorData);
    if (!tiles.length) {
      grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">No numeric readings found in API response.</div>`;
    } else {
      grid.innerHTML = tiles.map(t => `
        <div class="tile tile-good">
          <div class="tile-label">${t.label}</div>
          <div class="tile-value">${typeof t.value === 'number' ? t.value.toFixed(3) : t.value}</div>
          <div class="tile-unit">${t.unit}</div>
        </div>`).join('');
    }

    // ── Info table ──
    const updated = sensorMeta?.last_update || sensorMeta?.updated_at || sensorMeta?.timestamp || new Date().toLocaleString();
    const serial  = sensorMeta?.serial_number || sensorMeta?.id || currentSensorId;
    const firm    = sensorMeta?.firmware || sensorMeta?.firmware_version || '—';
    const loc     = sensorMeta?.location || sensorMeta?.address || '—';

    info.innerHTML = `
      <tr><td>Name</td><td>${name}</td></tr>
      <tr><td>Status</td><td><span class="${cls}">${status}</span></td></tr>
      <tr><td>Display update on</td><td>${updated}</td></tr>
      <tr><td>Serial number</td><td>${serial}</td></tr>
      <tr><td>Firmware</td><td>${firm}</td></tr>
      <tr><td>Location</td><td>${loc}</td></tr>
    `;

    document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();

  } catch (e) {
    grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">
      ⚠ Could not load sensor data: ${e.message}<br><br>
      <small>If this is a CORS error, the API may need to be proxied. Check browser console for details.</small>
    </div>`;
    console.error(e);
  }
}

/* ═══════════════════════════════════════════════
   REFRESH
═══════════════════════════════════════════════ */
function refresh() {
  loadSensorList();
  loadSensor(currentSensorId);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
async function init() {
  await loadSensorList();
  await loadSensor(currentSensorId);
}

init();
setInterval(refresh, 5 * 60 * 1000);
</script>

</body>
</html>
